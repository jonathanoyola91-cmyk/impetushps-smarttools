<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Solicitud de precio enviada</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f7fb;
            color:#1f2937;
        }
        .wrap{
            max-width:800px;
            margin:60px auto;
            padding:20px;
        }
        .card{
            background:#fff;
            border:1px solid #e5e7eb;
            border-radius:16px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.06);
        }
        .btn{
            display:inline-block;
            text-decoration:none;
            padding:12px 18px;
            border-radius:10px;
            font-weight:bold;
            background:#111827;
            color:#fff;
            margin-top:20px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Solicitud enviada</h1>
            <p>{{ mensaje }}</p>

            <p>
                Nuestro equipo comercial revisará la información y se pondrá en contacto
                con usted para suministrar el valor correspondiente.
            </p>

            <p><strong>Empresa:</strong> {{ solicitud.empresa }}</p>
            <p><strong>Contacto:</strong> {{ solicitud.contacto }}</p>
            <p><strong>Correo:</strong> {{ solicitud.correo }}</p>

            <a class="btn" href="{% url 'reparacion_camara' %}">Volver al módulo</a>
        </div>
    </div>
</body>
</html>
