{% extends "cotizador/base.html" %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <h1>Recuperar contraseña</h1>

        <p>
            Ingrese el correo asociado a su cuenta.
            Recibirá un enlace para cambiar la contraseña.
        </p>

        <form method="post">
            {% csrf_token %}
            {{ form.email }}

            <button type="submit" class="btn-login">
                Enviar enlace
            </button>
        </form>
    </div>
</div>
{% endblock %}
