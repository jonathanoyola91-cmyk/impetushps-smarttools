{% extends "cotizador/base.html" %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <h1>Nueva contraseña</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn-login">
                Cambiar contraseña
            </button>
        </form>
    </div>
</div>
{% endblock %}
